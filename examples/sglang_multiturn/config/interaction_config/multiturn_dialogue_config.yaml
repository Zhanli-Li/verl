interaction:
  - name: "multiturn_dialogue"
    class_name: "verl.interactions.multiturn_dialogue_interaction.MultiturnDialogueInteraction"
    config:
      scoring_model: "dialogue_scorer"
      response_model: "dialogue_responder"
      scoring_prompt_template: |
        Rate this dialogue turn from 0.0 to 1.0 based on relevance, helpfulness, and coherence:
        
        Dialogue:
        {dialogue}
        
        Score:
      response_prompt_template: |
        Continue this conversation naturally and helpfully:
        
        {dialogue}
        
        Response:
      min_score_threshold: 0.3
      good_score_threshold: 0.7
      max_turns: 8
      turn_weights: [1.0, 1.0, 1.0, 1.0, 0.9, 0.8, 0.7, 0.6]  # Diminishing importance of later turns